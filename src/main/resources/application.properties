spring.application.name=realtime-chat
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/chat_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
# Set DB_PASSWORD in env (e.g. Render) or local run config — never commit real passwords
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT (set JWT_SECRET in production — min 32 characters)
jwt.secret=${JWT_SECRET:dev-only-change-me-use-a-long-random-string-min-32-chars!!}
jwt.expiration-ms=604800000
