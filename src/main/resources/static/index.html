<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#111b21">
    <title>Chats</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="authModal" class="modal">
    <div class="modal-content auth-card">
        <div class="auth-brand">💬</div>
        <div class="auth-tabs">
            <button type="button" id="tabLogin" class="auth-tab active">Log in</button>
            <button type="button" id="tabSignup" class="auth-tab">Sign up</button>
        </div>

        <div id="loginPanel">
            <p class="muted">Sign in with email and password.</p>
            <label class="field-label" for="loginEmail">Email</label>
            <input id="loginEmail" type="email" autocomplete="username" placeholder="name@example.com">
            <label class="field-label" for="loginPassword">Password</label>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password">
            <button id="loginBtn" type="button" class="btn-block btn-primary">Log in</button>
        </div>

        <div id="signupPanel" class="hidden">
            <p class="muted">Create your account.</p>
            <label class="field-label" for="nameInput">Name</label>
            <input id="nameInput" type="text" placeholder="Your name" maxlength="120" autocomplete="name">
            <label class="field-label" for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="name@example.com" autocomplete="email">
            <label class="field-label" for="signupPassword">Password</label>
            <input id="signupPassword" type="password" autocomplete="new-password" placeholder="At least 6 characters" minlength="6">
            <label class="field-label" for="signupPassword2">Confirm password</label>
            <input id="signupPassword2" type="password" autocomplete="new-password" placeholder="Repeat password" minlength="6">
            <button id="signupBtn" type="button" class="btn-block btn-primary">Create account</button>
        </div>

        <p id="authError" class="error"></p>
    </div>
</div>

<div id="profileModal" class="modal hidden">
    <div class="modal-content">
        <h2>Profile</h2>
        <p class="muted">Name and security.</p>
        <label class="field-label" for="profileNameInput">Name</label>
        <input id="profileNameInput" type="text" maxlength="120" placeholder="Your name">
        <label class="field-label" for="profileEmailReadonly">Email</label>
        <input id="profileEmailReadonly" type="email" readonly class="readonly-input">
        <hr class="divider">
        <h3 class="section-title">Change password</h3>
        <label class="field-label" for="currentPasswordInput">Current password</label>
        <input id="currentPasswordInput" type="password" autocomplete="current-password" placeholder="Current password">
        <label class="field-label" for="newPasswordInput">New password</label>
        <input id="newPasswordInput" type="password" autocomplete="new-password" placeholder="At least 6 characters" minlength="6">
        <div class="modal-actions">
            <button id="profileCancelBtn" type="button" class="btn-secondary">Close</button>
            <button id="profileSaveBtn" type="button" class="btn-primary">Save name</button>
        </div>
        <button id="changePasswordBtn" type="button" class="btn-secondary btn-block">Update password</button>
        <p id="profileError" class="error"></p>
    </div>
</div>

<div class="app">
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-topbar">
            <span class="sidebar-brand">Chats</span>
        </header>

        <div class="sidebar-profile">
            <div class="avatar avatar-lg" id="myAvatar" aria-hidden="true">?</div>
            <div class="sidebar-profile-text">
                <h3 id="myDisplayName">-</h3>
                <p id="myEmail" class="me-email">-</p>
                <span id="connectionBadge" class="status-pill offline">offline</span>
            </div>
            <div class="me-actions">
                <button id="profileBtn" type="button" class="icon-btn icon-btn-ghost" title="Settings" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.06-.73-1.69-.98l-.38-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.06.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65z"/></svg>
                </button>
                <button id="logoutBtn" type="button" class="icon-btn icon-btn-ghost" title="Log out" aria-label="Log out">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                </button>
            </div>
        </div>

        <div class="search-wrap">
            <span class="search-icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="#8696a0"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </span>
            <input id="userSearch" type="search" placeholder="Search or start new chat" autocomplete="off">
        </div>

        <ul id="userList" class="user-list"></ul>
    </aside>

    <main class="chat" id="chatPanel">
        <header class="chat-header">
            <button id="backBtn" class="icon-btn icon-btn-light" type="button" aria-label="Back to chats">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <div class="chat-header-avatar avatar hidden" id="chatHeaderAvatar" aria-hidden="true">?</div>
            <div class="chat-header-text">
                <h3 id="chatWith">Select a chat</h3>
                <p id="chatWithSub" class="chat-sub hidden"></p>
            </div>
        </header>

        <div class="messages-wrap">
            <div id="chatEmptyState" class="chat-empty">
                <div class="chat-empty-inner">
                    <div class="chat-empty-art" aria-hidden="true"></div>
                    <h2 class="chat-empty-title">Chat</h2>
                    <p class="chat-empty-sub">Select a conversation to start messaging.</p>
                    <p class="chat-empty-hint">End-to-end style layout · No media in this build</p>
                </div>
            </div>
            <section id="messages" class="messages"></section>
        </div>

        <div id="emojiPanel" class="emoji-panel hidden" aria-hidden="true">
            <emoji-picker id="emojiPicker"></emoji-picker>
        </div>

        <footer class="chat-input">
            <button id="emojiBtn" class="icon-btn icon-btn-input" type="button" aria-label="Emoji">
                <span class="emoji-face">😊</span>
            </button>
            <div class="input-pill">
                <input id="messageInput" type="text" placeholder="Type a message" enterkeyhint="send" disabled>
            </div>
            <button id="sendBtn" type="button" class="btn-send" disabled aria-label="Send">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </footer>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
<script src="app.js"></script>
</body>
</html>
